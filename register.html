<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
    <!-- Core Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | LinguaBridge - Start Learning</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22none%22 stroke=%22%23E8634A%22 stroke-width=%225%22/><path d=%22M30 40 Q50 30 70 40 Q80 60 50 75 Q20 60 30 40%22 fill=%22%23E8634A%22/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 60px 20px; background-color: var(--bg-color); color: var(--text-color); }
        .auth-card { width: 100%; max-width: 440px; padding: 30px; border-radius: 0; position: relative; background-color: var(--bg-color); border: 4px solid var(--border-color); color: var(--text-color); }
        .auth-card::before { content: ''; position: absolute; top: 10px; left: 10px; right: -10px; bottom: -10px; border: 4px solid var(--primary-color); z-index: -1; }
    </style>
</head>
<body>
    <!-- Header (Identical on all pages) -->
    <header class="navbar navbar-expand-custom sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <svg width="40" height="40" viewBox="0 0 200 200" class="me-2">
                    <circle cx="100" cy="100" r="90" fill="none" stroke="#E8634A" stroke-width="10"/>
                    <path d="M60 80 Q100 60 140 80 Q160 120 100 150 Q40 120 60 80" fill="#E8634A"/>
                </svg>
                <span class="h4 mb-0 fw-800 brand-text" style="font-family:'Outfit'">LinguaBridge</span>
            </a>

            <!-- Right-aligned Toggler for Mobile -->
            <button class="navbar-toggler p-2" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                <i class="bi bi-list fs-3"></i>
            </button>

            <!-- Desktop Navigation (Hidden < 1100px) -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="homeDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Home
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="homeDropdown">
                            <li><a class="dropdown-item" href="index.html">Explorer</a></li>
                            <li><a class="dropdown-item" href="home-2.html">Global</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="pricing.html">Plans</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Journal</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Connect</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3 desktop-nav-buttons">
                    <button class="btn btn-link p-0 text-black theme-toggle-btn"><i
                            class="bi bi-moon-fill theme-toggle-icon fs-5"></i></button>
                    <button class="btn btn-link p-0 text-black rtl-toggle-btn"><i
                            class="bi bi-translate fs-5"></i></button>
                    <a href="dashboard.html" class="btn btn-primary fw-bold">Access</a>
                    <a href="register.html" class="btn btn-primary fw-bold active">Join Us</a>
                </div>
            </div>

            <!-- Offcanvas Menu (Visible < 1100px) -->
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header border-bottom border-2 border-primary">
                    <button type="button" class="btn-close text-reset ms-auto" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body d-flex flex-column">
                    <nav class="navbar-nav gap-2">
                        <div class="nav-item-group">
                            <span class="nav-link disabled fw-800 text-primary small mb-1" style="opacity: 1;">HOME</span>
                            <div class="mobile-submenu d-flex flex-column gap-2">
                                <a class="nav-link" href="index.html">EXPLORE</a>
                                <a class="nav-link" href="home-2.html">GLOBAL</a>
                            </div>
                        </div>
                        <a class="nav-link" href="pricing.html">PLANS</a>
                        <a class="nav-link" href="services.html">SKILLS</a>
                        <a class="nav-link" href="blog.html">JOURNAL</a>
                        <a class="nav-link" href="contact.html">CONNECT</a>
                    </nav>
                    
                    <div class="mt-auto pt-5">
                        <div class="d-flex gap-2 mb-4">
                            <button class="btn btn-outline border-2 w-100 p-3 theme-toggle-btn"><i class="bi bi-moon-fill theme-toggle-icon"></i></button>
                            <button class="btn btn-outline border-2 w-100 p-3 rtl-toggle-btn"><i class="bi bi-translate"></i></button>
                        </div>
                        <a href="dashboard.html" class="btn btn-primary w-100 py-3 fw-800 mb-3">ACCESS PORTAL</a>
                        <a href="register.html" class="btn btn-outline border-3 border-primary w-100 py-3 fw-800">JOIN US</a>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <div class="auth-card">
        <div class="text-center mb-3">
            <a href="index.html" class="d-inline-flex align-items-center mb-2 text-decoration-none">
                <svg width="60" height="60" viewBox="0 0 200 200" class="me-2">
                    <circle cx="100" cy="100" r="90" fill="none" stroke="#E8634A" stroke-width="10"/>
                    <path d="M60 80 Q100 60 140 80 Q160 120 100 150 Q40 120 60 80" fill="#E8634A"/>
                </svg>
                <span class="h3 mb-0 fw-800 text-inherit" style="font-family:'Outfit'">LinguaBridge</span>
            </a>
            <h2 class="fw-800 h4 mb-0">Join Community</h2>
        </div>

        <div class="d-flex gap-2 mb-3">
            <button class="btn btn-outline border-2 w-100 py-3 fw-800 d-flex align-items-center justify-content-center gap-2"><i class="bi bi-google"></i> GOOGLE</button>
            <button class="btn btn-outline border-2 w-100 py-3 fw-800 d-flex align-items-center justify-content-center gap-2"><i class="bi bi-facebook"></i> FACEBOOK</button>
        </div>

        <div class="text-center mb-2">
            <p class="small fw-bold text-uppercase tracking-widest opacity-50 px-0">OR REGISTER WITH EMAIL</p>
        </div>

        <form class="needs-validation" novalidate id="register-form">
            <div class="mb-3">
                <label class="form-label fw-800 small tracking-widest uppercase">FULL NAME</label>
                <input type="text" class="form-control border-3 border-primary p-3 bg-transparent text-inherit" required placeholder="User Name">
            </div>
            <div class="mb-3">
                <label class="form-label fw-800 small tracking-widest uppercase">EMAIL ADDRESS</label>
                <input type="email" class="form-control border-3 border-black p-3 bg-white text-black" required placeholder="name@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label fw-800 small tracking-widest uppercase">PASSWORD</label>
                <input type="password" class="form-control border-3 border-black p-3 bg-white text-black" required placeholder="••••••••">
            </div>
            <div class="mb-3">
                <label class="form-label fw-800 small tracking-widest uppercase">CONFIRM PASSWORD</label>
                <input type="password" class="form-control border-3 border-black p-3 bg-white text-black" required placeholder="••••••••">
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input border-2 border-primary" type="checkbox" id="terms" required>
                <label class="form-check-label fw-bold small" for="terms">ACCEPT TERMS AND CONDITIONS</label>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-800">JOIN US NOW</button>
        </form>

        <div class="text-center mt-3">
            <p class="small fw-bold mb-0">Already joined? <a href="dashboard.html" class="text-primary fw-800 text-decoration-none">ACCESS PORTAL</a></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', (e) => {
            if (e.target.checkValidity()) {
                e.preventDefault();
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
